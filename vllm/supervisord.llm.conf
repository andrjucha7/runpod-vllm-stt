[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/tmp/supervisord.pid

[program:vllm]
command=vllm serve %(ENV_VLLM_MODEL)s --host 0.0.0.0 --port 8000 --gpu-memory-utilization %(ENV_VLLM_GPU_MEM_UTIL)s --max-model-len %(ENV_VLLM_MAX_MODEL_LEN)s
autostart=true
autorestart=unexpected
startretries=3
priority=10
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
stopasgroup=true
killasgroup=true